    <script>
      const anchorLinks = Array.from(document.querySelectorAll(".project-anchor a"));
      const pageSections = anchorLinks
        .map((link) => document.querySelector(link.getAttribute("href")))
        .filter(Boolean);
      let activeId = "";
      let scrollTicking = false;

      const setActiveAnchor = (id) => {
        if (!id || id === activeId) return;
        activeId = id;
        anchorLinks.forEach((link) => {
          const active = link.getAttribute("href") === `#${id}`;
          if (active) {
            link.setAttribute("aria-current", "true");
            link.scrollIntoView({ block: "nearest", inline: "nearest" });
          } else {
            link.removeAttribute("aria-current");
          }
        });
      };

      const updateActiveAnchor = () => {
        scrollTicking = false;
        const probeY = window.innerHeight * 0.32;
        let current = pageSections[0];

        for (const section of pageSections) {
          const rect = section.getBoundingClientRect();
          if (rect.top <= probeY && rect.bottom > probeY) {
            current = section;
            break;
          }
          if (rect.top <= probeY) {
            current = section;
          }
        }

        setActiveAnchor(current.id);
      };

      const requestAnchorUpdate = () => {
        if (scrollTicking) return;
        scrollTicking = true;
        requestAnimationFrame(updateActiveAnchor);
      };

      window.addEventListener("scroll", requestAnchorUpdate, { passive: true });
      window.addEventListener("resize", requestAnchorUpdate);
      window.addEventListener("load", requestAnchorUpdate, { once: true });
      requestAnchorUpdate();
    </script>
